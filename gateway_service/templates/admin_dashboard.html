{% extends "base.html" %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<h1 class="mb-3">Admin Dashboard</h1>
<div class="row">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3">
            <div class="card-header">Users</div>
            <div class="card-body">
                <h5 class="card-title">{{ users_count or 0 }}</h5>
                <p class="card-text">registered users</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success mb-3">
            <div class="card-header">Courses</div>
            <div class="card-body">
                <h5 class="card-title">{{ course_count or 0 }}</h5>
                <p class="card-text">total courses</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning mb-3">
            <div class="card-header">Audit</div>
            <div class="card-body">
                <h5 class="card-title">{{ audit_count or 0 }}</h5>
                <p class="card-text">log entries</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
